name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
        id: setup-go
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Generate SHA256 per archive
        run: |
          cat > .goreleaser-after.sh << 'SCRIPT'
          #!/bin/env bash
          set -euo pipefail
          DIST_DIR="$1"
          for f in "$DIST_DIR"/cs-cloud-*.{tar.gz,zip}; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "${sha}  ${base}" > "${f}.sha256"
            echo "checksum: ${base} -> ${sha}"
          done
          SCRIPT
          chmod +x .goreleaser-after.sh
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GO_VERSION: go${{ steps.setup-go.outputs.go-version }}
      - name: Upload per-archive SHA256
        run: |
          for f in dist/cs-cloud-*.{tar.gz,zip}.sha256; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    name: Sync Release To Gitee
    needs: release
    runs-on: ubuntu-latest
    environment: release-notify
    outputs:
      url_map: ${{ steps.upload.outputs.url_map }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" -D dist -p "cs-cloud-*" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read GitHub release body
        id: release-meta
        run: |
          BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body // empty')
          {
            echo 'body<<EOF'
            printf '%s\n' "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Gitee tag if needed
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="xdfield"
          REPO="cs-cloud-release"
          TAG="${GITHUB_REF_NAME}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          create_resp=$(rcurl -sS -X POST \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/tags" \
            --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
            --data-urlencode "tag_name=${TAG}" \
            --data-urlencode "refs=${TARGET_REF}")

          if printf '%s' "$create_resp" | jq -e '.name? // .commit?.sha? // empty' > /dev/null; then
            exit 0
          fi

          err=$(printf '%s' "$create_resp" | jq -r '.message // .error // empty')
          if printf '%s' "$err" | grep -Eqi 'exist|已存在'; then
            exit 0
          fi

          printf '%s\n' "$create_resp"
          exit 1
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Create or get Gitee release
        id: gitee-release
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="xdfield"
          REPO="cs-cloud-release"
          TAG="${GITHUB_REF_NAME}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          existing=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_ACCESS_TOKEN}" \
            || true)

          if [ -n "$existing" ] && [ "$(printf '%s' "$existing" | jq -r '.id // empty')" != "" ]; then
            release_id=$(printf '%s' "$existing" | jq -r '.id')
          else
            created=$(rcurl -sS -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
              --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
              --data-urlencode "tag_name=${TAG}" \
              --data-urlencode "name=${TAG}" \
              --data-urlencode "body=${BODY}" \
              --data-urlencode "prerelease=false" \
              --data-urlencode "target_commitish=${TARGET_REF}")
            release_id=$(printf '%s' "$created" | jq -r '.id')
            if [ -z "$release_id" ]; then
              printf '%s\n' "$created"
              exit 1
            fi
          fi

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
        env:
          BODY: ${{ steps.release-meta.outputs.body }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Upload binaries to Gitee release
        id: upload
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="xdfield"
          REPO="cs-cloud-release"
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID="${{ steps.gitee-release.outputs.release_id }}"
          MAP_DIR=$(mktemp -d)

          attachments=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_ACCESS_TOKEN}" \
            || printf '[]')

          i=0
          for f in dist/cs-cloud-*; do
            [ -f "$f" ] || continue
            i=$((i + 1))
            (
              base=$(basename "$f")
              map_file="${MAP_DIR}/${i}.json"

              attach_id=$(printf '%s' "$attachments" | jq -r --arg name "$base" '.[] | select(.name == $name) | .id' | head -n 1)
              if [ -n "$attach_id" ]; then
                rcurl -fsS -X DELETE \
                  "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files/${attach_id}?access_token=${GITEE_ACCESS_TOKEN}" \
                  > /dev/null
              fi

              resp=$(rcurl -fsS -X POST \
                "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
                -F "access_token=${GITEE_ACCESS_TOKEN}" \
                -F "file=@${f}")

              url=$(printf '%s' "$resp" | jq -r '.browser_download_url // .download_url // .url // empty')
              if [ -z "$url" ]; then
                url="https://gitee.com/${OWNER}/${REPO}/releases/download/${TAG}/${base}"
              fi

              jq -n --arg k "$base" --arg v "$url" '{($k): $v}' > "$map_file"
            ) &
          done

          wait

          if compgen -G "${MAP_DIR}/*.json" > /dev/null; then
            jq -s 'add' "${MAP_DIR}"/*.json > "${MAP_DIR}/url_map.json"
          else
            printf '{}' > "${MAP_DIR}/url_map.json"
          fi

          {
            echo 'url_map<<EOF'
            cat "${MAP_DIR}/url_map.json"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

  notify-server:
    name: Notify CoStrict Server
    needs:
      - release
      - sync-to-gitee
    runs-on: ubuntu-latest
    if: ${{ vars.COSTRICT_NOTIFY_ENABLED == 'true' }}
    environment: release-notify
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" -D dist -p "cs-cloud-*" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release payload
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BODY=$(gh release view "${TAG}" --json body -q '.body // empty')
          GITEE_URL_MAP='${{ needs.sync-to-gitee.outputs.url_map }}'
          {
            printf '{"version":"%s","changelog":' "$VERSION"
            if [ -n "$BODY" ]; then
              printf '%s' "$(printf '%s' "$BODY" | jq -Rs .)"
            else
              printf 'null'
            fi
            printf ',"assets":['
            first=true
            for f in dist/cs-cloud-*; do
              [ -f "$f" ] || continue
              [[ "$f" == *.sha256 ]] && continue
              base=$(basename "$f")
              platform="${base#cs-cloud-}"
              platform="${platform%.tar.gz}"
              platform="${platform%.zip}"
              sha=$(sha256sum "$f" | awk '{print $1}')
              size=$(stat -c%s "$f")
              dl_url=$(printf '%s' "$GITEE_URL_MAP" | jq -r --arg name "$base" '.[$name] // empty')
              if [ -z "$dl_url" ]; then
                dl_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${base}"
              fi
              [ "$first" = true ] && first=false || printf ','
              printf '{"platform":"%s","downloadUrl":"%s","sha256":"%s","binarySize":%d}' "$platform" "$dl_url" "$sha" "$size"
            done
            printf ']}'
          } > /tmp/release-payload.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release on server
        run: |
          curl -sf -X POST \
            "${COSTRICT_SERVER_URL}/api/releases" \
            -H "Content-Type: application/json" \
            -H "X-System-Token: ${COSTRICT_SYSTEM_TOKEN}" \
            -d @/tmp/release-payload.json
        env:
          COSTRICT_SERVER_URL: ${{ secrets.COSTRICT_SERVER_URL }}
          COSTRICT_SYSTEM_TOKEN: ${{ secrets.COSTRICT_SYSTEM_TOKEN }}
